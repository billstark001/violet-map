name: Sync world archive

on:
  workflow_dispatch:
    inputs:
      source_dir:
        description: Repository-relative world archive directory
        required: true
        default: worlds/survival
      world:
        description: Target world name
        required: true
        default: survival
      target:
        description: Destination storage type
        required: true
        type: choice
        options: [server, s3]
      delete:
        description: Delete destination files missing from source
        required: true
        type: boolean
        default: false
      force:
        description: Permit a non-empty destination without a matching identity marker
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Synchronize world
        env:
          VIOLET_SERVER_URL: ${{ secrets.VIOLET_SERVER_URL }}
          VIOLET_SERVER_TOKEN: ${{ secrets.VIOLET_SERVER_TOKEN }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_PREFIX: ${{ secrets.S3_PREFIX }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
        run: |
          flags=()
          if [ "${{ inputs.delete }}" = "true" ]; then flags+=(--delete); fi
          if [ "${{ inputs.force }}" = "true" ]; then flags+=(--force); fi
          pnpm --filter @violet-map/assets dev world sync \
            --from "${{ inputs.source_dir }}" \
            --world "${{ inputs.world }}" \
            --target "${{ inputs.target }}" \
            "${flags[@]}"
